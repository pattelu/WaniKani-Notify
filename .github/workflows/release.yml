on:
  push:
    tags:
      - "v*"

name: Create Release

jobs:
  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/WaniKani-Notify_windows/**
            artifacts/WaniKani-Notify_linux/**
            artifacts/WaniKani-Notify_macos/**