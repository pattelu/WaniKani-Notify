name: Create Release

on:
  workflow_run:
    workflows: ["Build and upload executables"]
    types:
      - completed
    branches:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/WaniKani-Notify_windows/**
            artifacts/WaniKani-Notify_linux/**
            artifacts/WaniKani-Notify_macos/**